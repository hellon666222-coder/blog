      mac本地hosts文件配置验证nginx配置是否生效
      <p>当把华为云的前端程序部署到了阿里云，并且把华为云的https证书也部署到阿里云，nginx配置也处理增加完了后，不能马上把域名解析到服务器，需要验证从本地访问阿里云 是否能够正常访问。</p>
      <p>这里就要用到mac本地的hosts文件配置了，增加两条ip和域名的配置，这样就能测试通过域名访问阿里云服务器，是否正常。</p>
      <p>47.109.30.142   eyod.com
         47.109.30.142   www.eyod.com</p>
